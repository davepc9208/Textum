<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />

    <!-- SEO base -->
    <title>TEXTUM — Mentoría Académica | Ecuador y Perú</title>
    <meta name="description" content="Mentoría académica personalizada para Examen Complexivo y Artículo Científico. Doctoras expertas en Ecuador y Perú. Reserva tu sesión gratis." />
    <meta name="robots" content="index, follow" />
    <meta name="author" content="TEXTUM — Mentoría Académica" />
    <meta name="keywords" content="mentoría académica, examen complexivo, artículo científico, tesis, APA 7, Ecuador, Perú, redacción académica, defensa oral" />

    <!-- Canonical base -->
    <link rel="canonical" href="https://mentoriatextum.com/" />

    <!-- Open Graph base -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="TEXTUM — Mentoría Académica" />
    <meta property="og:title" content="TEXTUM — Mentoría Académica | Ecuador y Perú" />
    <meta property="og:description" content="Mentoría académica personalizada para Examen Complexivo y Artículo Científico. Doctoras expertas. Reserva tu sesión gratis." />
    <meta property="og:url" content="https://mentoriatextum.com/" />
    <meta property="og:image" content="https://mentoriatextum.com/og-default.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="es_EC" />

    <!-- Twitter Card base -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="TEXTUM — Mentoría Académica" />
    <meta name="twitter:description" content="Mentoría académica personalizada para Examen Complexivo y Artículo Científico en Ecuador y Perú." />
    <meta name="twitter:image" content="https://mentoriatextum.com/og-default.png" />

    <!-- Theme color -->
    <meta name="theme-color" content="#0d1f3c" />

    <!--
      FUENTES — Estrategia no bloqueante:
      1. preconnect solo a los 2 orígenes esenciales (antes eran 3, PageSpeed penalizaba)
      2. La hoja de fuentes se carga con rel=preload + onload trick para no bloquear render
      3. <noscript> como fallback para navegadores sin JS
    -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Carga no bloqueante de fuentes -->
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Inter:wght@300;400;500;600&display=swap"
      onload="this.onload=null;this.rel='stylesheet'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Inter:wght@300;400;500;600&display=swap"
      />
    </noscript>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
